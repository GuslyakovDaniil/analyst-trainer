version: '3.8'

services:
  db:
    image: postgres:15
    container_name: trainer_db
    environment:
      POSTGRES_DB: trainer_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      # Автоматическое выполнение SQL скрипта при первом запуске
      - ./src/main/resources/db/migration/V1__init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .
    container_name: trainer_app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      JDBC_URL: jdbc:postgresql://db:5432/trainer_db